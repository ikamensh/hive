# Hive CI auto-fix forwarder.
#
# Copy to a repo as `.github/workflows/hive-ci-autofix.yml`. When the repo's CI
# workflow fails on the default branch, this posts the failing-run logs to Hive's
# CI webhook; Hive files a `hive-ci` issue and its resolve→review→land pipeline
# fixes it. See wiki/ci-autofix.md.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   HIVE_URL                    - your chief's base URL, e.g. https://hive.example.com
#   HIVE_GITHUB_WEBHOOK_SECRET  - same value as HIVE_GITHUB_WEBHOOK_SECRET on the chief
#                                 (generate once with `openssl rand -hex 32`)
#
# Edit `workflows:` below to match the name of the CI workflow you want watched.

name: Hive CI auto-fix

on:
  workflow_run:
    workflows: ["Tests"] # <- the CI workflow to watch (its `name:`)
    types: [completed]

permissions:
  actions: read
  contents: read

jobs:
  forward-ci-failure:
    # Only a real failure on the default branch — feature-branch reds are not the
    # main build, and Hive re-confirms against the default branch anyway.
    if: >-
      github.event.workflow_run.conclusion == 'failure'
      && github.event.workflow_run.head_branch == github.event.repository.default_branch
    runs-on: ubuntu-latest
    steps:
      - name: Fetch failing logs
        id: logs
        run: |
          LOGS=$(gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed 2>/dev/null | tail -80 || echo "Could not fetch logs")
          echo "logs<<HIVE_EOF" >> $GITHUB_OUTPUT
          echo "$LOGS" >> $GITHUB_OUTPUT
          echo "HIVE_EOF" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify Hive
        run: |
          jq -n \
            --arg repo "${{ github.repository }}" \
            --arg ref "${{ github.event.workflow_run.head_branch }}" \
            --argjson run_id ${{ github.event.workflow_run.id }} \
            --arg details ${{ toJSON(steps.logs.outputs.logs) }} \
            '{repo: $repo, ref: $ref, event: "ci_failure", run_id: $run_id, details: $details}' \
          | curl -fsS -X POST "${{ secrets.HIVE_URL }}/api/ci/webhook" \
              -H "Content-Type: application/json" \
              -H "Authorization: Bearer ${{ secrets.HIVE_GITHUB_WEBHOOK_SECRET }}" \
              -d @-
