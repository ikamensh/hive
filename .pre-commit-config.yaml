repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check .
        language: system
        pass_filenames: false
        files: ^(hive|scripts|tests)/.*\.py$|^pyproject\.toml$|^uv\.lock$

      - id: backend-tests
        name: backend tests
        entry: uv run pytest tests/
        language: system
        pass_filenames: false
        files: ^(hive|scripts|tests)/.*\.py$|^pyproject\.toml$|^uv\.lock$

      - id: web-build
        name: web build
        entry: bash -c 'cd web && npm run build'
        language: system
        pass_filenames: false
        files: ^web/
